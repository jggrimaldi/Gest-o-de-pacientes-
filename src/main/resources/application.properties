# Configurań§es do Banco de Dados H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console do H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configurań§es do Flyway (Corrigido 'pring' para 'spring')
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
# ┌til para H2: limpa o banco se houver erro de validańŃo nas migrations
spring.flyway.clean-on-validation-error=true

# Configurań§es do Hibernate (Corrigido 'validade' para 'validate')
# Use 'validate' para que o Hibernate apenas cheque se o Flyway criou tudo certo
spring.jpa.hibernate.ddl-auto=none

# Seguranńa
jwt.secret=uma-chave-bem-grande-e-segura-com-mais-de-32-bytes